<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Sign In - South Sudan Relief</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>South Sudan Relief</h1>
        <nav>
            <a href="Index.html">Home</a>
            <a href="donor_register.html">Donor Registration</a>
            <a href="donor_signin.html">Donor Sign In</a>
            <a href="admin_signin.html">Admin Login</a>
            <a href="donate.html">Make a Donation</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Donor Sign In</h2>
            <form id="signinForm">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label>
                    <input type="checkbox" name="remember"> Remember me
                </label>

                <button type="submit">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="donor_register.html">Register here</a>
            </p>
            <p style="text-align: center;">
                <a href="#">Forgot your password?</a>
            </p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 South Sudan Relief. All rights reserved.</p>
        <p>Contact us: - Email: info@southsudanrelief.org  Website: www.southsudanrelief.org</p>
    </footer>
    <script src="js/validation.js"></script>
</body>
</html>
