<!DOCTYPE html>

</head>
<body>
    <header>
        <h1>South Sudan Relief</h1>
        <nav>
            <a href="Index.html">Home</a>
            <a href="donor_register.html">Donor Registration</a>
            <a href="donor_signin.html">Donor Sign In</a>
            <a href="admin_signin.html">Admin Login</a>
            <a href="donate.html">Make a Donation</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Admin Login</h2>
            <form id="adminLoginForm">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label>
                    <input type="checkbox" name="remember"> Remember me
                </label>

                <button type="submit">Login as Admin</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: #d63031; font-weight: 600;">
                Authorized Personnel Only
            </p>
        </section>
    </main>

        <p>Contact us: - Email: info@southsudanrelief.org  Website: www.southsudanrelief.org</p>
    </footer>
    <script src="js/validation.js"></script>
</body>
</html>
