<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Registration - South Sudan Relief</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>South Sudan Relief</h1>
        <nav>
            <a href="Index.html">Home</a>
            <a href="donor_register.html">Donor Registration</a>
            <a href="donor_signin.html">Donor Sign In</a>
            <a href="admin_signin.html">Admin Login</a>
            <a href="donate.html">Make a Donation</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Donor Registration</h2>
            <form id="registrationForm">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>

                <label for="country">Country:</label>
                <input type="text" id="country" name="country" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required>

                <label for="donation_preference">Preferred Donation Type:</label>
                <select id="donation_preference" name="donation_preference" required>
                    <option value="">Select an option</option>
                    <option value="food">Food & Supplies</option>
                    <option value="medical">Medical Aid</option>
                    <option value="shelter">Shelter & Infrastructure</option>
                    <option value="general">General Relief</option>
                </select>

                <label>
                    <input type="checkbox" name="newsletter" checked> Subscribe to our newsletter
                </label>

                <label>
                    <input type="checkbox" name="terms" required> I agree to the Terms and Conditions
                </label>

                <button type="submit">Register as Donor</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 South Sudan Relief. All rights reserved.</p>
        <p>Contact us: - Email: info@southsudanrelief.org  Website: www.southsudanrelief.org</p>
    </footer>
    <script src="js/validation.js"></script>
</body>
</html>
